<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error — EKX Feedback</title>
  <style>
    body { font-family: 'Arial', sans-serif; background: #F5F6F7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .box { background: #fff; border-radius: 12px; border: 1px solid #D9DBDE; padding: 40px 32px; text-align: center; max-width: 400px; }
    h1 { font-size: 18px; color: #BB0000; margin-bottom: 12px; }
    p  { font-size: 14px; color: #475E75; }
    a  { display: inline-block; margin-top: 20px; color: #0070F2; font-size: 13px; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Session Unavailable</h1>
    <p>{{ message }}</p>
    <a href="/">Go to sessions list</a>
  </div>
</body>
</html>
